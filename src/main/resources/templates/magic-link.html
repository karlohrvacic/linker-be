<!DOCTYPE html>
<html th:lang="${lang}" lang="hr" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title th:text="${title}">Prijava u Ladicu</title>
  <style type="text/css">
    body, table, td, p, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    table { border-collapse: collapse !important; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
    @media only screen and (max-width: 600px) {
      .container { width: 100% !important; }
      .content { padding: 28px 24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#eef2ef; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#eef2ef;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table class="container" role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;">

          <!-- Brand -->
          <tr>
            <td align="center" style="padding:0 0 24px;">
              <img th:src="${logoUrl}" src="" width="44" height="44" alt="Ladica" style="display:inline-block; border-radius:11px; vertical-align:middle;">
              <span style="display:inline-block; vertical-align:middle; margin-left:11px; font-size:24px; font-weight:800; color:#15803d; letter-spacing:-0.02em;">Ladica</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td class="content" style="padding:36px 32px; background-color:#ffffff; border:1px solid #e2e8e3; border-radius:16px;">
              <h1 style="margin:0 0 14px; font-size:20px; font-weight:700; color:#1c2320; letter-spacing:-0.01em;" th:text="${title}">Prijava u Ladicu</h1>
              <p style="margin:0 0 26px; font-size:15px; line-height:1.6; color:#3a4540;" th:text="${intro}">Dodirni gumb ispod za prijavu.</p>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center" style="padding:4px 0 8px;">
                    <a th:href="@{${magic_link_url}}" target="_blank"
                       style="display:inline-block; padding:15px 44px; font-size:16px; font-weight:700; color:#ffffff; text-decoration:none; background-color:#15803d; border-radius:14px;"
                       th:text="${buttonLabel}">Prijavi se</a>
                  </td>
                </tr>
              </table>

              <hr style="border:none; border-top:1px solid #e2e8e3; margin:28px 0 20px;">

              <p style="margin:0 0 6px; font-size:13px; line-height:1.6; color:#5d6a64;" th:text="${fallback}">Ako gumb ne radi, kopiraj ovu poveznicu:</p>
              <p style="margin:0 0 20px; font-size:13px; line-height:1.6; word-break:break-all;">
                <a th:href="@{${magic_link_url}}" style="color:#116e34; text-decoration:underline;"><span th:text="${magic_link_url}">https://ladica.hrva.cc/…</span></a>
              </p>
              <p style="margin:0; font-size:13px; line-height:1.6; color:#8a958f;" th:text="${ignore}">Ako nisi zatražio/la ovu poruku, slobodno je zanemari.</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:22px 32px 0;">
              <p style="margin:0; font-size:12px; line-height:1.5; color:#8a958f;" th:text="${footer}">Ladica · spremi linkove, otvori jednim dodirom</p>
              <p style="margin:6px 0 0; font-size:12px; color:#8a958f;">© <a href="https://ladica.hrva.cc" style="color:#8a958f; text-decoration:underline;">ladica.hrva.cc</a></p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
